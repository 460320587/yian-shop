# ============================================================
# 怡安印刷商城 — 本地开发环境 (精简版)
# 适配: 8GB 内存电脑
# 去掉: Meilisearch + Queue Worker + Mailpit
# 搜索用数据库 LIKE 替代，队列用 sync 驱动
# 用法: docker compose -f docker-compose.dev-lite.yml up -d
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    container_name: yian-dev-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:cached
      - ./docker/php/php.ini.dev:/usr/local/etc/php/php.ini:ro
      - ./storage/logs:/var/www/html/storage/logs
      - ./storage/app:/var/www/html/storage/app
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=${APP_KEY:-base64:dummy}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-yian_shop}
      - DB_USERNAME=${DB_USERNAME:-yian}
      - DB_PASSWORD=${DB_PASSWORD:-yian}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # 精简版: 关闭 Meilisearch，使用 Scout 的 database 驱动
      - SCOUT_DRIVER=database
      # 精简版: 队列用 sync 驱动，不跑 Horizon
      - QUEUE_CONNECTION=sync
      # 精简版: 缓存用 Redis，会话用文件
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=file
    networks:
      - yian-dev-lite
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.25-alpine
    container_name: yian-dev-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/logs:/var/log/nginx
    networks:
      - yian-dev-lite
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: yian-dev-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - mysql-dev-data:/var/lib/mysql
      - ./docker/mysql/my.cnf.dev:/etc/mysql/conf.d/my.cnf:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-yian_shop}
      MYSQL_USER: ${DB_USERNAME:-yian}
      MYSQL_PASSWORD: ${DB_PASSWORD:-yian}
    networks:
      - yian-dev-lite
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: yian-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
      - ./docker/redis/redis.conf.dev:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - yian-dev-lite

networks:
  yian-dev-lite:
    driver: bridge

volumes:
  mysql-dev-data:
  redis-dev-data:
