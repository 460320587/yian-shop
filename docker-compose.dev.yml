# ============================================================
# 怡安印刷商城 — 本地开发环境 (完整版)
# 适配: 16GB+ 内存电脑
# 服务: PHP-FPM + Nginx + MySQL + Redis + Meilisearch + Queue Worker
# 用法: docker compose -f docker-compose.dev.yml up -d
# ============================================================

services:
  # -----------------------------------------------------------
  # PHP-FPM (开发版含 Xdebug)
  # -----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    container_name: yian-dev-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:cached
      - ./docker/php/php.ini.dev:/usr/local/etc/php/php.ini:ro
      - ./storage/logs:/var/www/html/storage/logs
      - ./storage/app:/var/www/html/storage/app
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=${APP_KEY:-base64:dummy}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-yian_shop}
      - DB_USERNAME=${DB_USERNAME:-yian}
      - DB_PASSWORD=${DB_PASSWORD:-yian}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILISEARCH_KEY:-masterKey}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_KEY=${MINIO_KEY:-minioadmin}
      - MINIO_SECRET=${MINIO_SECRET:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-yian}
    networks:
      - yian-dev
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    # 开发环境资源不设限，让电脑自己分配

  # -----------------------------------------------------------
  # Nginx
  # -----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: yian-dev-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/logs:/var/log/nginx
    networks:
      - yian-dev
    depends_on:
      - app

  # -----------------------------------------------------------
  # MySQL 8.0 (开发配置)
  # -----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: yian-dev-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - mysql-dev-data:/var/lib/mysql
      - ./docker/mysql/my.cnf.dev:/etc/mysql/conf.d/my.cnf:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-yian_shop}
      MYSQL_USER: ${DB_USERNAME:-yian}
      MYSQL_PASSWORD: ${DB_PASSWORD:-yian}
    networks:
      - yian-dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -----------------------------------------------------------
  # Redis 7
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: yian-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
      - ./docker/redis/redis.conf.dev:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - yian-dev

  # -----------------------------------------------------------
  # Meilisearch (本地搜索)
  # -----------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: yian-dev-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-dev-data:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey}
    networks:
      - yian-dev

  # -----------------------------------------------------------
  # Queue Worker (Horizon)
  # -----------------------------------------------------------
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    container_name: yian-dev-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - ./:/var/www/html:cached
      - ./docker/php/php.ini.dev:/usr/local/etc/php/php.ini:ro
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY:-base64:dummy}
      - DB_HOST=mysql
      - DB_PASSWORD=${DB_PASSWORD:-yian}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    networks:
      - yian-dev
    depends_on:
      - mysql
      - redis

  # -----------------------------------------------------------
  # Mailpit (本地邮件捕获，替代 Mailhog)
  # -----------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: yian-dev-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"    # SMTP
      - "8025:8025"    # Web UI
    volumes:
      - mailpit-dev-data:/data
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
    networks:
      - yian-dev

networks:
  yian-dev:
    driver: bridge

volumes:
  mysql-dev-data:
  redis-dev-data:
  meilisearch-dev-data:
  mailpit-dev-data:
